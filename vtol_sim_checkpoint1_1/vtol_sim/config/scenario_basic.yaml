# =============================================================================
# 시나리오 1: Basic (기준선)
# =============================================================================
name: "scenario_basic"
description: "정상 조건. 알고리즘 기본 성능 비교."

# Waypoint 생성
waypoint:
  source: "auto"               # 'auto' | 'manual'
  auto:
    n_waypoints: 6
    area_size: 1500.0          # m × m (1.5 km 사각형 영역)
    min_separation: 330.0      # m, 최소 WP 간 거리
    altitude_range: [120.0, 200.0]  # m, 자동 생성 시 고도 범위
    seed: 42                   # 재현성
  manual: []                   # source='manual'일 때 사용. 각 WP는 [x_N, x_E, h] (NED, m)

# 외란
noise:
  gps_sigma: 0.5               # m, 위치 오차 1σ
  gps_bias_tau: 300.0          # s, Gauss-Markov 시정수
  gps_bias_drive_sigma: 0.05   # m, 바이어스 구동잡음 1σ

  wind_steady: [0.0, 0.0, 0.0] # m/s, [w_N, w_E, w_D]
  wind_gust_sigma: 2.5         # m/s
  wind_gust_length_scale: 200.0 # m

  actuator_deadband_deg: 1.0   # deg, 뱅크각 데드밴드
  actuator_bias_sigma_deg: 0.5 # deg, 1σ

# 지연 (시뮬레이션 설정의 기본값 override 가능)
delay_overrides:
  delay_comm_to_fcc: 0.02      # s

# 가속도 제한 override
a_max_g: 0.3

# Monte Carlo
monte_carlo:
  n_runs: 1                    # Phase 1 통합 테스트는 1회. 최종 평가는 30.
  seed_base: 1000

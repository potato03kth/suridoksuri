# =============================================================================
# 기체 파라미터 (VTOL 소형 항공기)
# =============================================================================
mass: 4.400                  # kg
gravity: 9.81                # m/s^2

# 관성 모멘트 (point-mass 모델에서는 직접 사용 안 하지만 참조용)
inertia:
  Ixx: 0.23791
  Iyy: 0.72737
  Izz: 0.93746
  Ixz: 0.06351

# 무게중심 (참조용)
cg:
  x: 0.065
  y: 0.000
  z: -0.055

# 속도 제약
v_stall: 13.8                # m/s (~49.5 km/h) 실속속도
v_min_turn: 16.5             # m/s (59.4 km/h) 최소 선회속도
v_cruise: 18.0               # m/s (64.8 km/h) 순항속도
v_max: 27.7                  # m/s (~100 km/h) 최대속도

# 가속도 제약
a_max_g: 0.3                 # 최대 총 가속도 (g 단위, body-frame 측정 기준)

# 자세 제약 (구조/공력 한계 — 동역학 saturation에 사용)
phi_max_deg: 69.7            # 최대 뱅크각 (구조 한계)
gamma_max_deg: 15.0          # 최대 상승각
gamma_min_deg: -10.0         # 최소 상승각 (강하)

# 운영 고도 제약 (지오펜스)
h_min: 50.0                  # m
h_max: 300.0                 # m

# 1차 지연 시정수
tau_phi: 0.10                # s, 뱅크각 응답 지연
tau_thrust: 0.10             # s, 추력 응답 지연
tau_gamma: 0.30              # s, 비행경로각(γ) 응답 지연 (피치 명령 추적)

# 천이 (HOVER ↔ CRUISE)
h_transition: 100.0          # m, 천이 발생 고도
